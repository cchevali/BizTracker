services:
  postgres:
    image: postgres:16-alpine
    container_name: business-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: business_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d business_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
