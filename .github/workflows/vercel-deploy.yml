name: Vercel Deploy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"
  NEXT_PUBLIC_BASE_PATH: /biztracker
  NEXT_PUBLIC_SITE_URL: https://microflowops.com
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

jobs:
  preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Pull Vercel preview environment
        run: npx vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Apply preview database migrations
        run: |
          set -a
          source .vercel/.env.preview.local
          set +a
          for attempt in 1 2 3; do
            if npx prisma migrate deploy; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "Prisma migrate deploy failed on attempt $attempt. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Build preview deployment
        run: |
          set -a
          source .vercel/.env.preview.local
          set +a
          npx vercel build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy preview
        id: deploy
        run: |
          deployment_url="$(npx vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "preview_url=${deployment_url}/biztracker" >> "$GITHUB_OUTPUT"

      - name: Write preview summary
        run: |
          {
            echo "### Preview Deployment"
            echo
            echo "- Standalone preview: ${{ steps.deploy.outputs.preview_url }}"
            echo "- Public production path remains: https://microflowops.com/biztracker"
          } >> "$GITHUB_STEP_SUMMARY"

  production:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Pull Vercel production environment
        run: npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Apply production database migrations
        run: |
          set -a
          source .vercel/.env.production.local
          set +a
          for attempt in 1 2 3; do
            if npx prisma migrate deploy; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "Prisma migrate deploy failed on attempt $attempt. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Build production deployment
        run: |
          set -a
          source .vercel/.env.production.local
          set +a
          npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production
        id: deploy
        run: |
          deployment_url="$(npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Write production summary
        run: |
          {
            echo "### Production Deployment"
            echo
            echo "- Standalone deployment: ${{ steps.deploy.outputs.deployment_url }}/biztracker"
            echo "- Public app: https://microflowops.com/biztracker"
          } >> "$GITHUB_STEP_SUMMARY"
